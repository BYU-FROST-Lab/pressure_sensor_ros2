depth_converter:
  ros__parameters:
    fluid_density: 1025.0
    use_salinity_model: false
    water_salinity_ppt: 35.0
    fluid_pressure_atm: 87250.0
    calibration_samples: 100
    calibration_timeout_s: 10.0
    calibration_max_variance: 100.0
    calibration_max_offset: 40000.0
    calibrate_on_startup: true
    # Optional: path to this param file.  When set, a successful calibration
    # writes the updated fluid_pressure_atm value back here so the value
    # persists across restarts.  Leave empty (or omit) to disable.
    param_file_path: ""
